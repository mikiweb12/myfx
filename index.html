<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --primary: #3b82f6;
  --success: #22c55e;
  --danger: #ef4444;
  --text: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: var(--card);
  align-items: center;
}

.header h1 {
  font-size: 20px;
}

.profile img {
  border-radius: 50%;
}

/* Layout */
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

/* Balance */
.balance-card {
  background: var(--card);
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 20px;
}

.balance-card p {
  font-size: 2.2rem;
  margin-top: 10px;
  font-weight: bold;
}

/* Buttons */
.actions, .filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: var(--primary);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

button.danger {
  background: var(--danger);
}

/* Transactions */
.transactions {
  background: var(--card);
  padding: 15px;
  border-radius: 10px;
}

.transactions h3 {
  margin-bottom: 10px;
}

.transactions li {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #334155;
  font-size: 14px;
}

.credit { color: var(--success); }
.debit { color: var(--danger); }

/* Modal */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: var(--card);
  padding: 20px;
  margin: 20% auto;
  width: 90%;
  max-width: 350px;
  border-radius: 10px;
  text-align: center;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

/* Notification */
#notification {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 15px;
  border-radius: 6px;
  display: none;
  font-size: 14px;
}

@media (max-width: 500px) {
  .actions, .filters {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header class="header">
  <h1>💳 My Wallet</h1>
  <div class="profile">
    <img src="https://i.pravatar.cc/40">
  </div>
</header>

<div class="container">

  <div class="balance-card">
    <h2>Balance</h2>
    <p id="balance">$0.00</p>
  </div>

  <div class="actions">
    <button onclick="openModal('add')">Add</button>
    <button onclick="openModal('send')">Send</button>
    <button onclick="openModal('withdraw')">Withdraw</button>
  </div>

  <div class="filters">
    <button onclick="filterTx('all')">All</button>
    <button onclick="filterTx('credit')">Credit</button>
    <button onclick="filterTx('debit')">Debit</button>
    <button class="danger" onclick="clearAll()">Clear</button>
  </div>

  <div class="transactions">
    <h3>Transactions</h3>
    <ul id="list"></ul>
  </div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <input type="number" id="amount" placeholder="Enter amount">
    <button onclick="submitTx()">Confirm</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<div id="notification"></div>

<script>
let balance = Number(localStorage.getItem("balance")) || 10000;
let transactions = JSON.parse(localStorage.getItem("tx")) || [];
let mode = "add";

/* UI Update */
function update(filter="all") {
  document.getElementById("balance").textContent = format(balance);
  const list = document.getElementById("list");
  list.innerHTML = "";

  let data = filter === "all" ? transactions :
             transactions.filter(t => t.type === filter);

  data.forEach(t => {
    const li = document.createElement("li");
    li.innerHTML = `
      <span>${t.date}</span>
      <span class="${t.type}">
        ${t.type==="credit" ? "+" : "-"}${format(t.amount)}
      </span>`;
    list.appendChild(li);
  });
}

/* Modal */
function openModal(type){
  mode = type;
  document.getElementById("modal").style.display="block";
  document.getElementById("modalTitle").textContent=type.toUpperCase();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("amount").value="";
}

/* Transaction */
function submitTx(){
  const amount = Number(document.getElementById("amount").value);

  if(!amount || amount <= 0){
    notify("Invalid amount", true); return;
  }

  if((mode==="send"||mode==="withdraw") && amount > balance){
    notify("Insufficient balance", true); return;
  }

  let type = "credit";

  if(mode==="add"){
    balance += amount;
  } else {
    balance -= amount;
    type="debit";
  }

  transactions.unshift({
    amount,
    type,
    date: new Date().toLocaleString()
  });

  save();
  update();
  closeModal();
  notify("Success");
}

/* Storage */
function save(){
  localStorage.setItem("balance", balance);
  localStorage.setItem("tx", JSON.stringify(transactions));
}

/* Filters */
function filterTx(t){ update(t); }

/* Clear */
function clearAll(){
  if(confirm("Clear everything?")){
    balance=0; transactions=[];
    save(); update();
    notify("Cleared");
  }
}

/* Utils */
function notify(msg, err=false){
  const n = document.getElementById("notification");
  n.textContent = msg;
  n.style.background = err ? "#ef4444" : "#22c55e";
  n.style.display = "block";
  setTimeout(()=>n.style.display="none",2000);
}

function format(num){
  return "$" + num.toFixed(2);
}

/* Close modal with ESC */
window.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* Init */
update();
</script>

</body>
</html>
